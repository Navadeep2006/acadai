<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AcadAI — Student Performance Predictor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/static/css/app.css"/>
</head>
<body>
<div id="app">
  <!-- Login / Signup -->
  <div id="loginPage" class="page-wrap">
    <div class="login-card">
      <div class="login-logo">&#128218; AcadAI</div>
      <div class="login-tagline">ML-Powered Student Performance Predictor</div>
      <div class="role-tabs">
        <button class="role-tab active" id="rtab-student" onclick="UI.switchRole('student')">&#127891; Student</button>
        <button class="role-tab" id="rtab-teacher" onclick="UI.switchRole('teacher')">&#128105;&#8205;&#127979; Teacher</button>
      </div>

      <!-- Student fields -->
      <div id="f-student">
        <div class="field">
          <label>Select Student</label>
          <select id="sel-student"></select>
        </div>
        <div class="field"><label>Password</label><input type="password" id="inp-spass" placeholder="Your password"/></div>
      </div>

      <!-- Teacher fields -->
      <div id="f-teacher" class="hidden">
        <div class="auth-toggle">
          <button class="auth-tab active" id="atab-login"  onclick="UI.switchAuth('login')">Sign In</button>
          <button class="auth-tab"        id="atab-signup" onclick="UI.switchAuth('signup')">Create Account</button>
        </div>
        <div id="tf-login">
          <div class="field"><label>Email</label><input type="email" id="inp-temail" placeholder="teacher@school.edu"/></div>
          <div class="field"><label>Password</label><input type="password" id="inp-tpass" placeholder="Password"/></div>
        </div>
        <div id="tf-signup" class="hidden">
          <div class="field-row">
            <div class="field"><label>Full Name</label><input type="text" id="su-name" placeholder="Dr. Jane Smith"/></div>
            <div class="field"><label>Subject</label><input type="text" id="su-subject" placeholder="Mathematics"/></div>
          </div>
          <div class="field"><label>Email</label><input type="email" id="su-email" placeholder="jane@school.edu"/></div>
          <div class="field-row">
            <div class="field"><label>Password</label><input type="password" id="su-pass" placeholder="Min 6 chars"/></div>
            <div class="field"><label>Confirm</label><input type="password" id="su-pass2" placeholder="Repeat"/></div>
          </div>
        </div>
      </div>

      <div id="login-err" class="error-box hidden"></div>
      <div id="login-ok"  class="success-box hidden"></div>
      <button class="btn-primary" id="login-btn" onclick="API.doLogin()">Sign In &#8594;</button>
      <div class="login-hint" id="login-hint">
        <b>Teacher:</b> teacher@school.edu / teach123 &nbsp;|&nbsp;
        <b>Students:</b> alex123 &bull; priya123 &bull; marcus123 &bull; yuki123
      </div>
    </div>
  </div>

  <!-- App Layout -->
  <div id="appLayout" class="hidden">
    <aside class="sidebar" id="sidebar">
      <div class="s-logo">&#128218; AcadAI<small id="s-sub"></small></div>
      <div class="nav-sec">Navigation</div>
      <div id="nav-items"></div>
      <div class="s-footer">
        <div class="s-user">
          <div class="avatar" id="s-av"></div>
          <div><div class="u-name" id="s-name"></div><div class="u-role" id="s-role"></div></div>
        </div>
        <button class="nav-btn" style="color:var(--red)" onclick="API.doLogout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </button>
        <!-- Real-time indicator -->
        <div id="rt-indicator" class="rt-dot disconnected" title="Real-time connection"></div>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="Modal.closeOutside(event)">
  <div class="modal" id="modal-box"></div>
</div>

<div id="toast"></div>

<script src="/static/js/api.js"></script>
<script src="/static/js/ui.js"></script>
<script src="/static/js/charts.js"></script>
<script src="/static/js/pages.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
